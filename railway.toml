# Railway deploy config. Builds the Dockerfile (prod `api` stage = last stage).
# The Dockerfile uses BuildKit `--mount=type=cache` on the pip/npm steps so deps
# are not re-downloaded every deploy; cache mounts only apply under the
# dockerfile builder, hence the explicit setting below.
#
# Set the rest in the Railway dashboard (Variables + Volume):
#   DATABASE_URL=${{Postgres.DATABASE_URL}}
#   DB_PASSWORD=<any non-empty>
#   SCOUT_CACHE_DIR=/cache
#   HF_HOME=/cache
#   ANTHROPIC_API_KEY / PUBMED_API_KEY / NCBI_API_KEY / OPENFDA_API_KEY
#
# A persistent volume MUST be attached at /cache (service volume
# "indication_scout-volume"). SCOUT_CACHE_DIR and HF_HOME both point there, so it
# holds the BioLORD model + the Open Targets file cache. If the volume is missing,
# /cache silently falls back to ephemeral container storage and is WIPED on every
# restart/redeploy (the model re-downloads, the cache is lost). Volume config is
# not expressed in this file — verify it with `railway volume list`.

[build]
builder = "dockerfile"

[deploy]
# Health check: Railway waits for this to pass before routing traffic.
healthcheckPath = "/health"
healthcheckTimeout = 500
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
