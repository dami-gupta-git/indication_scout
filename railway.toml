# Railway deploy config. Builds with Railpack (not the Dockerfile): the
# Dockerfile's startup model preload OOMs on the current instance size, so the
# service uses Railpack which boots within the healthcheck window.
#
# Set the rest in the Railway dashboard (Variables + Volume), see DEPLOY_RAILWAY.md:
#   DATABASE_URL=${{Postgres.DATABASE_URL}}
#   DB_PASSWORD=<any non-empty>
#   SCOUT_CACHE_DIR=/cache
#   HF_HOME=/cache
#   ANTHROPIC_API_KEY / PUBMED_API_KEY / NCBI_API_KEY / OPENFDA_API_KEY
# Mount a persistent volume at /cache.

[build]
builder = "railpack"

[deploy]
# Health check: Railway waits for this to pass before routing traffic.
healthcheckPath = "/health"
healthcheckTimeout = 500
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
