# Metformin regression spec.
#
# Authored against gold_standard/metformin_2026-07-18_20-48-39.json. Each
# assertion encodes a domain-meaningful invariant a regression must NOT flip.
# Anchors are chosen to be STABLE across runs — pinned only where they held
# across BOTH 2026-07-18 runs (20:19 and 20:48).
#
# Bucket values must match `tests/regression/failure_buckets.Bucket`.

drug: metformin

# Indication naming drifts run to run; resolve the variants to one canonical
# name so a rename upstream isn't read as a coverage regression. Observed across
# runs: hepatic steatosis <-> MASLD, cardiovascular disease <-> coronary artery
# disorder.
aliases:
  hepatic steatosis:
    - metabolic dysfunction-associated steatotic liver disease
    - non-alcoholic fatty liver disease
  cardiovascular disease:
    - coronary artery disorder
    - cardiovascular disorder

# PCOS is stably #1. Cardiovascular disease and hepatic steatosis are similarly
# weighted (both weak/mixed, neither animal-only) and swap #2/#3 run to run, so
# they are pinned present-in-top but NOT order-pinned.
ranked_order:
  bucket: ranking
  indications:
    - polycystic ovary syndrome

required_in_ranked:
  - bucket: ranking
    indication: cardiovascular disease
  - bucket: ranking
    indication: hepatic steatosis

candidate_set_contains:
  bucket: structural_integrity
  indications:
    - polycystic ovary syndrome
    - cardiovascular disease
    - hepatic steatosis
    - gestational diabetes
    - obesity
    - prediabetes syndrome

required_ncts_surfaced:
  - bucket: literature_coverage
    indication: polycystic ovary syndrome
    section: relevant
    ncts:
      - NCT00068861   # stable across both 07-18 runs
  - bucket: literature_coverage
    indication: cardiovascular disease
    section: relevant
    ncts:
      - NCT00343395   # stable across both 07-18 runs
      - NCT01217307
  - bucket: literature_coverage
    indication: hepatic steatosis
    section: relevant
    ncts:
      - NCT00063635   # stable across both 07-18 runs
      - NCT00303537

required_pmids_cited:
  - bucket: literature_coverage
    indication: polycystic ovary syndrome
    mode: cited
    pmids:
      - "10634377"   # stable across both 07-18 runs
  - bucket: literature_coverage
    indication: cardiovascular disease
    mode: cited
    pmids:
      - "23230096"   # stable across both 07-18 runs
      - "30993313"
  - bucket: literature_coverage
    indication: hepatic steatosis
    mode: cited
    pmids:
      - "19811343"   # stable across both 07-18 runs

# Safety — metformin carries black-box warnings (lactic acidosis). Production
# derives black_box from OT; holdout would fall back to serious.
safety_severity:
  - indication: polycystic ovary syndrome
    allowed: [black_box, serious]
  - indication: cardiovascular disease
    allowed: [black_box, serious]
  - indication: hepatic steatosis
    allowed: [black_box, serious]

# Drug-level collapsed safety signal must surface (empty = collapse regression).
drug_safety:
  summary_present: true
