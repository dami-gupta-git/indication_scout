# Sildenafil regression spec.
#
# Authored against gold_standard/sildenafil_2026-07-18_20-40-31.json. Each
# assertion encodes a domain-meaningful invariant a regression must NOT flip.
# Anchors are chosen to be STABLE across runs (confirmed identical across the
# 20:20 and 20:40 runs on 2026-07-18).
#
# Candidate-set shift from the prior (2026-07-13) gold: hypertension dropped out
# of the top-3 (replaced by malignant glioma) and is now only a candidate, not
# an investigated indication; duchenne muscular dystrophy is no longer surfaced.
# Anchors reconciled accordingly.
#
# Bucket values must match `tests/regression/failure_buckets.Bucket`.

drug: sildenafil

ranked_order:
  bucket: ranking
  indications:
    - raynaud disease
    - covid-19
    - malignant glioma

candidate_set_contains:
  bucket: structural_integrity
  indications:
    - raynaud disease
    - covid-19
    - malignant glioma
    - hypertension            # still surfaced as a candidate, no longer top-3
    - eisenmenger syndrome
    - benign prostatic hyperplasia

required_ncts_surfaced:
  - bucket: literature_coverage
    indication: raynaud disease
    section: relevant
    ncts:
      - NCT02050360   # stable across the 20:20/20:40 runs
  - bucket: literature_coverage
    indication: covid-19
    section: relevant
    ncts:
      - NCT04489446
      - NCT04304313

required_pmids_cited:
  - bucket: literature_coverage
    indication: raynaud disease
    mode: cited
    pmids:
      - "21360507"   # supporting
      - "30383134"   # contradicting
  - bucket: literature_coverage
    indication: covid-19
    mode: cited
    pmids:
      - "37243243"
      - "34980198"

# Safety — sildenafil carries a serious-severity signal (priapism, NAION,
# hypotension with nitrates). Production/holdout both land on `serious` here.
safety_severity:
  - indication: raynaud disease
    allowed: [serious, black_box, moderate]
  - indication: covid-19
    allowed: [serious, black_box, moderate]

# Drug-level collapsed safety signal must surface (empty = collapse regression).
drug_safety:
  summary_present: true
