# Semaglutide regression spec.
#
# Authored against gold_standard/semaglutide_2026-07-18_20-42-04.json. Each
# assertion encodes a domain-meaningful invariant a regression must NOT flip.
# Anchors are chosen to be STABLE across runs — pinned only where they held
# across BOTH 2026-07-18 runs (20:17 and 20:42); volatile NCTs are omitted.
#
# Candidate-set shift from the prior (2026-07-13) gold: the top-3 changed
# entirely (type-1 diabetes / NAFLD / parkinson -> cardiovascular / kidney /
# diabetes). The old anchors pinned a different investigated set and are fully
# replaced here.
#
# Bucket values must match `tests/regression/failure_buckets.Bucket`.

drug: semaglutide

ranked_order:
  bucket: ranking
  indications:
    - cardiovascular disorder
    - kidney disorder
    - diabetes mellitus

candidate_set_contains:
  bucket: structural_integrity
  indications:
    - cardiovascular disorder
    - kidney disorder
    - diabetes mellitus
    - parkinson disease
    - metabolic dysfunction-associated steatotic liver disease
    - polycystic ovary syndrome

required_ncts_surfaced:
  - bucket: literature_coverage
    indication: cardiovascular disorder
    section: relevant
    ncts:
      - NCT07483801   # stable across both 07-18 runs
  - bucket: literature_coverage
    indication: kidney disorder
    section: relevant
    ncts:
      - NCT05822609   # stable across both 07-18 runs

required_pmids_cited:
  - bucket: literature_coverage
    indication: cardiovascular disorder
    mode: cited
    pmids:
      - "27633186"
      - "38796653"
  - bucket: literature_coverage
    indication: kidney disorder
    mode: cited
    pmids:
      - "34903039"
      - "38796653"

# Safety — semaglutide carries a black-box warning (thyroid C-cell / MTC risk).
# Production derives black_box from OT; holdout would fall back to serious.
safety_severity:
  - indication: cardiovascular disorder
    allowed: [black_box, serious]
  - indication: kidney disorder
    allowed: [black_box, serious]
  - indication: diabetes mellitus
    allowed: [black_box, serious]

# Drug-level collapsed safety signal must surface (empty = collapse regression).
drug_safety:
  summary_present: true
