services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: scout
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates scout_test database on first container startup.
      # The scout_test DB uses the same schema as scout but is
      # used exclusively by integration tests so test data never
      # contaminates the main database.
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d scout"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: api
    env_file:
      - .env
    environment:
      # Override the host-oriented DATABASE_URL from .env: inside the compose
      # network the DB is reached at service name "db" on the in-container port
      # 5432 (not the host-published 5438).
      DATABASE_URL: postgresql+psycopg2://scout:${DB_PASSWORD}@db:5432/scout
      TEST_DATABASE_URL: postgresql+psycopg2://scout:${DB_PASSWORD}@db:5432/scout_test
    ports:
      - "8000:8000"
    volumes:
      # Persisted file cache for all data sources (PubMed, FDA, ChEMBL,
      # ClinicalTrials, Open Targets, LLM synthesize steps). Starts empty.
      - scout_cache:/app/_cache
      # HuggingFace model cache so BioLORD-2023 downloads once.
      - hf_cache:/hf-cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  scout_cache:
  hf_cache:
