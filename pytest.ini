[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short -m "not regression and not regression_layer2 and not eval"
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
markers =
    regression: full-pipeline regression test against committed golden fixture (replay mode, slow)
    regression_layer2: spec-driven structural assertions over the latest scout-find payload (no LLM, no network)
    approval_aware: approval-aware relevance/labeling + dev-stage/ranking regression suite (spans services + agents)
    eval: deepeval groundedness test over a real end-to-end scout run (slow, live LLM + data sources)
