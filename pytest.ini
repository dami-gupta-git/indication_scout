[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short -m "not regression and not regression_layer2 and not eval"
    -W ignore::langchain_core._api.deprecation.LangChainPendingDeprecationWarning
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
# Silence known third-party/framework deprecation noise so real warnings stay visible.
# Matched by module (message text is unreliable — multi-line / varied categories).
filterwarnings =
    ignore:Support for class-based `config` is deprecated:DeprecationWarning
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:indication_scout.api.main
    ignore::pytest.PytestUnraisableExceptionWarning
# langgraph's import-time PendingDeprecationWarning is silenced in tests/conftest.py
# (it fires during collection, before these ini filters apply).
markers =
    regression: full-pipeline regression test against a committed gold_standard snapshot (replay mode, slow)
    regression_layer2: spec-driven structural assertions over the gold_standard snapshots (no LLM, no network)
    approval_aware: approval-aware relevance/labeling + dev-stage/ranking regression suite (spans services + agents)
    eval: deepeval groundedness test over a real end-to-end scout run (slow, live LLM + data sources)
